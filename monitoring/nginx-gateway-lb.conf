# Nginx load balancer for gateway workers.
# Listens on port 8780, round-robin to gateway upstream pool.
#
# Standalone:  nginx -p /tmp -c "$(pwd)/monitoring/nginx-gateway-lb.conf"
# Docker:      starts automatically via docker compose

worker_processes  1;
error_log  /tmp/nginx-gateway-lb.error.log  warn;
pid        /tmp/nginx-gateway-lb.pid;

events {
    worker_connections  1024;
}

http {
    upstream gateway {
        server gateway:8080;
        # Add more workers for multi-instance setups:
        # server gateway-2:8080;
        # server gateway-3:8080;
    }

    server {
        listen 8780;
        server_name  _;

        client_max_body_size 64m;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location / {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
        }
    }
}
